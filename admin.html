<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajustes — Ruleta Solei</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
<style>
  :root{
    --verde:#6B7840; --verde-dark:#535F30; --crema:#F0F2E6; --arena:#F5F0E8; --tinta:#2F3320;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--crema); color:var(--tinta); min-height:100vh; padding:32px 16px;
  }
  .tag{font-size:.68rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--verde);}
  h1{font-family:'PT Serif',serif;font-style:italic;font-weight:700;font-size:1.8rem;margin:4px 0 24px;}
  h2{font-family:'PT Serif',serif;font-style:italic;font-size:1.15rem;margin-bottom:14px;}
  .wrap{max-width:960px;margin:0 auto;}
  .grid{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start;}
  @media(max-width:820px){.grid{grid-template-columns:1fr;}}
  .panel{background:#fff;border-radius:20px;padding:26px;box-shadow:0 10px 34px rgba(107,120,64,.14);}
  label{display:block;font-size:.78rem;font-weight:600;margin:12px 0 5px;}
  input[type=text],input[type=password]{
    width:100%;padding:11px 14px;border:1.5px solid #dfe3d2;border-radius:12px;
    font-size:.95rem;font-family:inherit;background:#fbfcf8;outline:none;
  }
  input:focus{border-color:var(--verde);}
  .premio-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
  .premio-row input[type=text]{flex:1;}
  .premio-row input[type=color]{
    width:46px;height:42px;border:none;border-radius:10px;cursor:pointer;background:none;padding:0;
  }
  .premio-row .del{
    width:36px;height:36px;border:none;border-radius:50%;background:#fdf0ee;color:#a04434;
    font-size:1.1rem;cursor:pointer;line-height:1;flex-shrink:0;
  }
  .btn{
    padding:13px 28px;border:none;border-radius:40px;background:var(--verde);color:#fff;
    font-weight:700;font-size:.95rem;font-family:inherit;cursor:pointer;
    box-shadow:0 8px 28px rgba(107,120,64,.3);transition:background .2s;
  }
  .btn:hover{background:var(--verde-dark);}
  .btn:disabled{opacity:.55;cursor:wait;}
  .btn.sec{background:var(--arena);color:var(--verde-dark);box-shadow:none;}
  .btn.small{padding:10px 20px;font-size:.85rem;}
  .acciones{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px;}
  canvas{width:100%;display:block;}
  .msg{margin-top:14px;font-size:.88rem;font-weight:600;display:none;}
  .msg.ok{color:var(--verde-dark);display:block;}
  .msg.err{color:#a04434;display:block;}
  /* login */
  #login{max-width:380px;margin:12vh auto 0;text-align:center;}
  #login .panel{padding:40px 30px;}
  #login .btn{width:100%;margin-top:22px;}
  #app{display:none;}
  .csv{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="panel">
    <div class="tag">Solei Candle</div>
    <h1>Ajustes de la ruleta</h1>
    <label for="clave" style="text-align:left;">Clave de administrador</label>
    <input type="password" id="clave" placeholder="••••••••">
    <button class="btn" id="btnLogin">Entrar</button>
    <div class="msg" id="loginMsg"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="wrap">
  <div class="tag">Solei Candle</div>
  <h1>Ajustes de la ruleta</h1>

  <div class="grid">
    <div class="panel">
      <h2>Textos</h2>
      <label>Título</label>
      <input type="text" id="titulo">
      <label>Subtítulo</label>
      <input type="text" id="subtitulo">

      <h2 style="margin-top:26px;">Premios y colores</h2>
      <div id="premios"></div>
      <button class="btn sec small" onclick="agregarPremio()">+ Añadir premio</button>

      <div class="acciones">
        <button class="btn" id="btnGuardar" onclick="guardar()">Guardar cambios</button>
      </div>
      <div class="msg" id="saveMsg"></div>

      <h2 style="margin-top:30px;">Datos</h2>
      <div class="csv">
        <button class="btn sec small" onclick="descargarCSV('participantes')">Descargar participantes (CSV)</button>
        <button class="btn sec small" onclick="descargarCSV('giros')">Descargar giros (CSV)</button>
      </div>
    </div>

    <div class="panel">
      <h2>Vista previa</h2>
      <canvas id="preview" width="600" height="600"></canvas>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
let KEY = '';
let config = { titulo:'', subtitulo:'', premios:[] };

// ---------- Login ----------
document.getElementById('btnLogin').addEventListener('click', login);
document.getElementById('clave').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

async function login(){
  const clave = document.getElementById('clave').value.trim();
  const msg = document.getElementById('loginMsg');
  msg.className = 'msg';
  if(!clave) return;
  try{
    const r = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({ action:'login', key: clave }) });
    const d = await r.json();
    if(d.ok){
      KEY = clave;
      await cargarConfig();
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    }else{
      msg.textContent = 'Clave incorrecta';
      msg.className = 'msg err';
    }
  }catch(e){
    msg.textContent = 'Error de conexión. Revisa config.js';
    msg.className = 'msg err';
  }
}

// ---------- Config ----------
async function cargarConfig(){
  const r = await fetch(SCRIPT_URL + '?action=config');
  const d = await r.json();
  config = d.config;
  document.getElementById('titulo').value = config.titulo || '';
  document.getElementById('subtitulo').value = config.subtitulo || '';
  renderPremios();
}

function renderPremios(){
  const cont = document.getElementById('premios');
  cont.innerHTML = '';
  config.premios.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'premio-row';
    row.innerHTML = `
      <input type="text" value="${p.nombre.replace(/"/g,'&quot;')}" oninput="config.premios[${i}].nombre=this.value; dibujarPreview();">
      <input type="color" value="${p.color}" oninput="config.premios[${i}].color=this.value; dibujarPreview();">
      <button class="del" title="Eliminar" onclick="eliminarPremio(${i})">×</button>`;
    cont.appendChild(row);
  });
  dibujarPreview();
}

function agregarPremio(){
  config.premios.push({ nombre:'Nuevo premio', color:'#6B7840' });
  renderPremios();
}

function eliminarPremio(i){
  if(config.premios.length <= 2){ alert('La ruleta necesita mínimo 2 premios.'); return; }
  config.premios.splice(i,1);
  renderPremios();
}

async function guardar(){
  const btn = document.getElementById('btnGuardar');
  const msg = document.getElementById('saveMsg');
  msg.className = 'msg';
  btn.disabled = true; btn.textContent = 'Guardando…';
  config.titulo = document.getElementById('titulo').value;
  config.subtitulo = document.getElementById('subtitulo').value;
  try{
    const r = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({ action:'guardarConfig', key: KEY, config }) });
    const d = await r.json();
    if(d.ok){ msg.textContent = '✓ Guardado. La ruleta ya usa los nuevos ajustes.'; msg.className='msg ok'; }
    else{ msg.textContent = d.error || 'Error al guardar'; msg.className='msg err'; }
  }catch(e){
    msg.textContent = 'Error de conexión'; msg.className='msg err';
  }
  btn.disabled = false; btn.textContent = 'Guardar cambios';
}

// ---------- CSV ----------
async function descargarCSV(tipo){
  try{
    const r = await fetch(SCRIPT_URL + '?action=' + tipo + '&key=' + encodeURIComponent(KEY));
    const d = await r.json();
    if(!d.ok){ alert(d.error || 'Error'); return; }
    const csv = d.filas.map(f => f.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(',')).join('\n');
    const blob = new Blob(['﻿' + csv], { type:'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = tipo + '-solei.csv';
    a.click();
  }catch(e){ alert('Error de conexión'); }
}

// ---------- Vista previa ----------
document.getElementById('titulo').addEventListener('input', ()=>{});
function colorTexto(hex){
  const h = hex.replace('#','');
  const r=parseInt(h.substr(0,2),16), g=parseInt(h.substr(2,2),16), b=parseInt(h.substr(4,2),16);
  return (0.299*r + 0.587*g + 0.114*b) > 150 ? '#3A3E28' : '#FFFFFF';
}

function dibujarPreview(){
  const canvas = document.getElementById('preview');
  const ctx = canvas.getContext('2d');
  const n = config.premios.length;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!n) return;
  const cx=canvas.width/2, cy=canvas.height/2, r=canvas.width/2-8;
  const arco = 2*Math.PI/n;
  for(let i=0;i<n;i++){
    const ini = i*arco - Math.PI/2;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,ini,ini+arco); ctx.closePath();
    ctx.fillStyle = config.premios[i].color; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=4; ctx.stroke();
    ctx.save();
    ctx.translate(cx,cy); ctx.rotate(ini+arco/2);
    ctx.textAlign='right';
    ctx.fillStyle = colorTexto(config.premios[i].color);
    ctx.font='600 22px -apple-system, "Segoe UI", Roboto, sans-serif';
    ctx.fillText(config.premios[i].nombre, r-24, 8, r-80);
    ctx.restore();
  }
}
</script>
</body>
</html>
