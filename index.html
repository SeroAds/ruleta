<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruleta Solei — Regístrate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
<style>
  :root{
    --verde:#6B7840; --verde-dark:#535F30; --crema:#F0F2E6; --arena:#F5F0E8; --tinta:#2F3320;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--crema); color:var(--tinta);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px 16px;
  }
  .card{
    background:#fff; width:100%; max-width:420px; border-radius:24px;
    padding:40px 28px 32px; box-shadow:0 12px 40px rgba(107,120,64,.18); text-align:center;
  }
  .tag{
    font-size:.68rem; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
    color:var(--verde); margin-bottom:8px;
  }
  h1{
    font-family:'PT Serif',serif; font-style:italic; font-weight:700;
    font-size:1.9rem; margin-bottom:6px;
  }
  .sub{font-size:.95rem; color:#6b6b60; margin-bottom:28px;}
  form{text-align:left;}
  label{display:block; font-size:.8rem; font-weight:600; margin:14px 0 6px; color:var(--tinta);}
  input{
    width:100%; padding:13px 16px; border:1.5px solid #dfe3d2; border-radius:14px;
    font-size:1rem; font-family:inherit; background:#fbfcf8; outline:none; transition:border-color .2s;
  }
  input:focus{border-color:var(--verde);}
  button{
    width:100%; margin-top:26px; padding:15px; border:none; border-radius:40px;
    background:var(--verde); color:#fff; font-size:1.05rem; font-weight:700; font-family:inherit;
    cursor:pointer; box-shadow:0 8px 28px rgba(107,120,64,.3); transition:background .2s, transform .1s;
  }
  button:hover{background:var(--verde-dark);}
  button:active{transform:scale(.98);}
  button:disabled{opacity:.6; cursor:wait;}
  .error{
    display:none; margin-top:16px; padding:12px 14px; border-radius:12px;
    background:#fdf0ee; color:#a04434; font-size:.88rem; text-align:center;
  }
  /* Pantalla de confirmación */
  .confirm{display:none;}
  .confirm .check{
    width:88px; height:88px; margin:6px auto 22px; border-radius:50%;
    background:var(--verde); display:flex; align-items:center; justify-content:center;
    animation:pop .45s cubic-bezier(.2,1.4,.4,1);
  }
  .confirm svg{width:44px; height:44px; stroke:#fff; stroke-width:3; fill:none;}
  @keyframes pop{0%{transform:scale(.3);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .confirm h1{font-size:1.7rem;}
  .confirm p{margin-top:10px; font-size:.98rem; color:#55584a; line-height:1.55;}
  .confirm .nota{
    margin-top:24px; padding:14px; border-radius:14px; background:var(--arena);
    font-size:.88rem; color:var(--verde-dark); font-weight:600;
  }
</style>
</head>
<body>
<div class="card">

  <!-- FORMULARIO -->
  <div id="paso-form">
    <div class="tag">Solei Candle</div>
    <h1>Ruleta Solei</h1>
    <div class="sub">Regístrate para participar</div>
    <form id="form">
      <label for="nombre">Nombre</label>
      <input id="nombre" type="text" required autocomplete="given-name">
      <label for="apellido">Apellido</label>
      <input id="apellido" type="text" required autocomplete="family-name">
      <label for="telefono">Teléfono</label>
      <input id="telefono" type="tel" required autocomplete="tel" inputmode="tel">
      <label for="correo">Correo</label>
      <input id="correo" type="email" required autocomplete="email">
      <button id="btn" type="submit">Enviar</button>
      <div class="error" id="error"></div>
    </form>
  </div>

  <!-- CONFIRMACIÓN -->
  <div class="confirm" id="paso-ok">
    <div class="check">
      <svg viewBox="0 0 24 24"><polyline points="4 12.5 10 18.5 20 6.5"/></svg>
    </div>
    <div class="tag">Solei Candle</div>
    <h1>¡Registro confirmado!</h1>
    <p id="ok-msg">Ya estás participando en la Ruleta Solei.</p>
    <div class="nota">Acércate al stand y muestra esta pantalla para girar la ruleta 🍀</div>
  </div>

</div>

<script src="config.js"></script>
<script>
const form  = document.getElementById('form');
const btn   = document.getElementById('btn');
const errEl = document.getElementById('error');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Enviando…';

  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'registro',
        nombre:   document.getElementById('nombre').value,
        apellido: document.getElementById('apellido').value,
        telefono: document.getElementById('telefono').value,
        correo:   document.getElementById('correo').value
      })
    });
    const data = await res.json();

    if (data.ok) {
      mostrarConfirmacion('Ya estás participando en la Ruleta Solei.');
    } else if (data.error === 'duplicado') {
      mostrarConfirmacion('Este teléfono o correo ya estaba registrado. ¡Ya estás participando!');
    } else {
      throw new Error(data.error || 'Error');
    }
  } catch (err) {
    errEl.textContent = 'No se pudo enviar. Revisa tu conexión e intenta de nuevo.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Enviar';
  }
});

function mostrarConfirmacion(msg) {
  document.getElementById('ok-msg').textContent = msg;
  document.getElementById('paso-form').style.display = 'none';
  document.getElementById('paso-ok').style.display = 'block';
}
</script>
</body>
</html>
