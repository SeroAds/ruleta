<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruleta Solei</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
<style>
  :root{
    --verde:#6B7840; --verde-dark:#535F30; --crema:#F0F2E6; --arena:#F5F0E8; --tinta:#2F3320;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--crema); color:var(--tinta);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:24px 16px; overflow-x:hidden;
  }
  .tag{
    font-size:.68rem; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
    color:var(--verde); margin-bottom:6px;
  }
  h1{font-family:'PT Serif',serif; font-style:italic; font-weight:700; font-size:2.1rem; text-align:center;}
  .sub{font-size:.95rem; color:#6b6b60; margin:6px 0 26px; text-align:center;}
  .wheel-wrap{position:relative; width:min(86vw,440px); height:min(86vw,440px);}
  canvas{width:100%; height:100%; display:block; filter:drop-shadow(0 14px 34px rgba(107,120,64,.28));}
  .pointer{
    position:absolute; top:-8px; left:50%; transform:translateX(-50%);
    width:0; height:0; border-left:16px solid transparent; border-right:16px solid transparent;
    border-top:26px solid var(--tinta); z-index:5;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.25));
  }
  .hub{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:64px; height:64px; border-radius:50%; background:#fff; z-index:4;
    display:flex; align-items:center; justify-content:center;
    font-family:'PT Serif',serif; font-style:italic; font-weight:700; color:var(--verde);
    box-shadow:0 4px 14px rgba(0,0,0,.18); font-size:.8rem;
  }
  button.girar{
    margin-top:34px; padding:16px 64px; border:none; border-radius:40px;
    background:var(--verde); color:#fff; font-size:1.15rem; font-weight:700; font-family:inherit;
    letter-spacing:.06em; cursor:pointer; box-shadow:0 8px 28px rgba(107,120,64,.3);
    transition:background .2s, transform .1s;
  }
  button.girar:hover{background:var(--verde-dark);}
  button.girar:active{transform:scale(.97);}
  button.girar:disabled{opacity:.55; cursor:default;}
  /* Modal resultado */
  .overlay{
    position:fixed; inset:0; background:rgba(47,51,32,.55); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:#fff; border-radius:24px; padding:44px 32px 34px; text-align:center;
    max-width:380px; width:100%; animation:pop .45s cubic-bezier(.2,1.4,.4,1);
    box-shadow:0 20px 60px rgba(0,0,0,.3);
  }
  @keyframes pop{0%{transform:scale(.5);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .modal .mini{font-size:.72rem; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--verde);}
  .modal h2{
    font-family:'PT Serif',serif; font-style:italic; font-weight:700;
    font-size:2rem; margin:12px 0 6px; color:var(--tinta);
  }
  .modal p{color:#6b6b60; font-size:.92rem;}
  .modal button{
    margin-top:26px; padding:13px 40px; border:none; border-radius:40px;
    background:var(--verde); color:#fff; font-weight:700; font-size:1rem; font-family:inherit; cursor:pointer;
    box-shadow:0 8px 28px rgba(107,120,64,.3);
  }
  .cargando{color:#6b6b60; font-size:.9rem; margin-top:20px;}
</style>
</head>
<body>

<div class="tag">Solei Candle</div>
<h1 id="titulo">Ruleta Solei</h1>
<div class="sub" id="subtitulo">Cargando…</div>

<div class="wheel-wrap">
  <div class="pointer"></div>
  <canvas id="wheel" width="900" height="900"></canvas>
  <div class="hub">Solei</div>
</div>

<button class="girar" id="btnGirar" disabled>GIRAR</button>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mini">Resultado</div>
    <h2 id="premioGanado">—</h2>
    <p>¡Felicitaciones! Muestra esta pantalla al equipo Solei.</p>
    <button onclick="cerrar()">Girar de nuevo</button>
  </div>
</div>

<script src="config.js"></script>
<script>
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const btn = document.getElementById('btnGirar');

let premios = [];
let angulo = 0;        // rotación actual en radianes
let girando = false;

// ---------- Cargar configuración ----------
(async function init(){
  try{
    const res = await fetch(SCRIPT_URL + '?action=config');
    const data = await res.json();
    if(!data.ok) throw new Error(data.error);
    aplicarConfig(data.config);
  }catch(e){
    document.getElementById('subtitulo').textContent = 'Error cargando la configuración. Revisa config.js';
  }
})();

function aplicarConfig(cfg){
  document.getElementById('titulo').textContent = cfg.titulo || 'Ruleta Solei';
  document.getElementById('subtitulo').textContent = cfg.subtitulo || '';
  premios = cfg.premios || [];
  dibujar();
  btn.disabled = false;
}

// ---------- Dibujo ----------
function colorTexto(hex){
  const h = hex.replace('#','');
  const r=parseInt(h.substr(0,2),16), g=parseInt(h.substr(2,2),16), b=parseInt(h.substr(4,2),16);
  return (0.299*r + 0.587*g + 0.114*b) > 150 ? '#3A3E28' : '#FFFFFF';
}

function dibujar(){
  const n = premios.length;
  if(!n) return;
  const cx = canvas.width/2, cy = canvas.height/2, r = canvas.width/2 - 10;
  const arco = (2*Math.PI)/n;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(angulo);

  for(let i=0;i<n;i++){
    const ini = i*arco - Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,r,ini,ini+arco);
    ctx.closePath();
    ctx.fillStyle = premios[i].color;
    ctx.fill();
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 5;
    ctx.stroke();

    // texto
    ctx.save();
    ctx.rotate(ini + arco/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = colorTexto(premios[i].color);
    ctx.font = '600 34px -apple-system, "Segoe UI", Roboto, sans-serif';
    ctx.fillText(premios[i].nombre, r - 34, 12, r - 110);
    ctx.restore();
  }

  // borde exterior
  ctx.beginPath();
  ctx.arc(0,0,r,0,2*Math.PI);
  ctx.lineWidth = 12;
  ctx.strokeStyle = '#FFFFFF';
  ctx.stroke();
  ctx.restore();
}

// ---------- Giro ----------
btn.addEventListener('click', girar);

function girar(){
  if(girando || !premios.length) return;
  girando = true;
  btn.disabled = true;

  const n = premios.length;
  const arco = (2*Math.PI)/n;
  const elegido = Math.floor(Math.random()*n);

  // ángulo final: el centro del segmento elegido queda bajo el puntero (arriba)
  const centroSegmento = elegido*arco + arco/2;
  const vueltas = 5 + Math.floor(Math.random()*3);   // 5–7 vueltas
  const destino = vueltas*2*Math.PI + (2*Math.PI - centroSegmento);

  const inicio = angulo % (2*Math.PI);
  const delta = destino - inicio;
  const dur = 5200;
  const t0 = performance.now();

  function frame(t){
    const p = Math.min((t - t0)/dur, 1);
    const ease = 1 - Math.pow(1-p, 4);   // ease-out
    angulo = inicio + delta*ease;
    dibujar();
    if(p < 1){
      requestAnimationFrame(frame);
    }else{
      angulo = angulo % (2*Math.PI);
      girando = false;
      mostrarResultado(premios[elegido].nombre);
    }
  }
  requestAnimationFrame(frame);
}

function mostrarResultado(premio){
  document.getElementById('premioGanado').textContent = premio;
  document.getElementById('overlay').classList.add('show');
  // registrar el giro en el Sheet (no bloquea la UI)
  fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({ action:'giro', premio }) }).catch(()=>{});
}

function cerrar(){
  document.getElementById('overlay').classList.remove('show');
  btn.disabled = false;
}
</script>
</body>
</html>
